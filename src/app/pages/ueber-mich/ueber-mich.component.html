<!-- Profil-Sektion -->
<section class="section-padding bg-background-warm relative overflow-hidden">
  <div class="blob-decoration w-[500px] h-[500px] bg-primary -top-64 -right-32" aria-hidden="true"></div>
  <div class="container-page relative z-10">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16 items-center">

      <!-- Bild (5 cols) -->
      <div class="lg:col-span-5">
        <img
          [ngSrc]="profile.image.src"
          width="480"
          height="600"
          [alt]="profile.image.alt"
          class="rounded-2xl shadow-lg w-full"
          priority
        />
      </div>

      <!-- Text (7 cols) -->
      <div class="lg:col-span-7">
        <p class="label-text text-primary mb-4">Über mich</p>
        <h1 class="heading-display mb-3">{{ profile.name }}</h1>
        <p class="font-sans text-lg font-semibold text-primary mb-6">{{ profile.title }}</p>
        <p class="font-serif text-lg text-text-light leading-relaxed">{{ profile.statement }}</p>
      </div>

    </div>
  </div>
</section>

<!-- Werdegang -->
<section class="section-padding bg-white">
  <div class="container-narrow">
    <h2 class="heading-1 text-center mb-16">Werdegang</h2>

    <div class="relative">
      <!-- Vertikale Linie -->
      <div
        class="absolute left-5 md:left-1/2 top-0 bottom-0 w-px bg-border -translate-x-1/2"
        aria-hidden="true"
      ></div>

      @for (entry of profile.timeline; track entry.period; let even = $even) {
        <div class="relative flex items-start mb-12 last:mb-0">
          <!-- Punkt -->
          <div
            class="absolute left-5 md:left-1/2 w-3 h-3 bg-primary rounded-full -translate-x-1/2 mt-1 z-10 ring-4 ring-white"
            aria-hidden="true"
          ></div>

          <!-- Content -->
          <div
            class="ml-14 md:ml-0 md:w-1/2"
            [class]="even ? 'md:pr-16 md:text-right' : 'md:pl-16 md:ml-auto'"
          >
            <p class="label-text text-primary">{{ entry.period }}</p>
            <h3 class="font-sans text-lg font-semibold text-secondary mt-1">{{ entry.title }}</h3>
            @if (entry.description) {
              <p class="body-text-sm mt-1">{{ entry.description }}</p>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>

<!-- CTA -->
<app-cta-banner [content]="cta" />
