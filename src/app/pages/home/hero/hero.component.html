<section id="hero-section" class="relative bg-primary overflow-hidden min-h-screen flex flex-col justify-center">
  <!-- Blob decorations -->
  <div class="blob-decoration w-[600px] h-[600px] bg-secondary -top-64 -left-64" aria-hidden="true"></div>
  <div class="blob-decoration w-[400px] h-[400px] bg-primary-dark -bottom-32 right-0" aria-hidden="true"></div>

  <div class="w-full px-5 sm:px-8 lg:px-16 py-16 relative z-10">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">

      <!-- Text (7 cols) -->
      <div class="lg:col-span-7">
        <h1 class="font-sans text-4xl md:text-6xl lg:text-7xl font-bold text-secondary leading-[1.05] tracking-tight whitespace-pre-line mb-6">
          {{ hero.headline }}
        </h1>
        <p class="font-serif text-lg md:text-xl text-secondary/80 leading-relaxed max-w-lg mb-10">
          {{ hero.subline }}
        </p>
        <div class="flex flex-wrap gap-4">
          <a [routerLink]="hero.ctaLink" class="inline-flex items-center justify-center px-8 py-4 bg-secondary text-white font-sans font-semibold rounded-full hover:bg-secondary-light hover:shadow-lg transition-all duration-300">{{ hero.ctaText }}</a>
          @if (hero.secondaryCtaText) {
            <a [routerLink]="hero.secondaryCtaLink" class="inline-flex items-center justify-center px-8 py-4 bg-secondary/10 text-secondary font-sans font-semibold rounded-full border border-secondary/30 hover:bg-secondary/20 transition-all duration-300">{{ hero.secondaryCtaText }}</a>
          }
        </div>
      </div>

      <!-- Profile image (5 cols) -->
      <div class="lg:col-span-5 flex items-center justify-center">
        <img
          ngSrc="https://placehold.co/400x400?text=Wiebke+Lef%C3%A8vre"
          alt="Wiebke Lefèvre – Geschäftsführerin WPL Beraten"
          width="400"
          height="400"
          class="rounded-full object-cover shadow-2xl w-64 h-64 lg:w-80 lg:h-80"
          priority
        />
      </div>

    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="absolute bottom-32 left-1/2 -translate-x-1/2 z-10 flex flex-col items-center gap-1" aria-hidden="true">
    <span class="text-secondary/60 text-xs font-sans uppercase tracking-widest">Scroll</span>
    <svg class="w-5 h-5 text-secondary/60 animate-bounce" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </div>
</section>
