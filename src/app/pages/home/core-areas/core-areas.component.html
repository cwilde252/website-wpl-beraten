<section class="section-padding bg-background-warm">
  <div class="container-page">
    <app-section-intro
      label="Was wir tun"
      title="Drei Perspektiven. Ein Ziel."
      body="Wirtschaftsprüfung, Beratung und Steuerplanung — individuell auf Ihr Unternehmen zugeschnitten."
    />

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
      @for (area of areas; track area.id) {
        <div
          class="card-hover border-t-4"
          [style.border-top-color]="'var(--color-' + area.accentColor + ')'"
        >
          <p
            class="label-text mb-3"
            [style.color]="'var(--color-' + area.accentColor + ')'"
          >{{ area.subtitle }}</p>
          <h3 class="heading-3 mb-4">{{ area.title }}</h3>
          <p class="body-text-sm mb-6">{{ area.description }}</p>
          <a
            [routerLink]="area.link"
            class="link-underline inline-flex items-center gap-2"
            [attr.aria-label]="'Mehr zu ' + area.title + ' erfahren'"
          >
            Mehr erfahren
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
          </a>
        </div>
      }
    </div>
  </div>
</section>
