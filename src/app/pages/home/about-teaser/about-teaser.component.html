<section class="section-padding bg-white">
  <div class="container-page">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16 items-center">

      <!-- Bild (5 cols) -->
      <div class="lg:col-span-5">
        <img
          [ngSrc]="teaser.image.src"
          [width]="teaser.image.width!"
          [height]="teaser.image.height!"
          [alt]="teaser.image.alt"
          class="rounded-2xl shadow-lg w-full h-auto"
        />
      </div>

      <!-- Text (7 cols) -->
      <div class="lg:col-span-7">
        <p class="label-text text-primary mb-4">Über mich</p>
        <h2 class="heading-1 mb-6">{{ teaser.headline }}</h2>
        <p class="body-text mb-8">{{ teaser.text }}</p>
        <a [routerLink]="teaser.ctaLink" class="link-underline inline-flex items-center gap-2">
          {{ teaser.ctaText }}
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
          </svg>
        </a>
      </div>

    </div>
  </div>
</section>
